steps:
  # Build frontend
  - name: "node:20"
    dir: "frontend"
    entrypoint: "sh"
    args:
      - "-c"
      - "npm install && npm run build"

  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/repsense-ai:$COMMIT_SHA"
      - "-f"
      - "deploy/Dockerfile"
      - "."

  # Push image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/repsense-ai:$COMMIT_SHA"

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "repsense-ai"
      - "--image=gcr.io/$PROJECT_ID/repsense-ai:$COMMIT_SHA"
      - "--region=us-central1"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=2Gi"
      - "--cpu=2"
      - "--set-env-vars=GEMINI_API_KEY=${_GEMINI_API_KEY}"

substitutions:
  _GEMINI_API_KEY: ""

images:
  - "gcr.io/$PROJECT_ID/repsense-ai:$COMMIT_SHA"
